<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🥜 Clean Room v2</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif;
            background: #0a0a0a;
            color: #e0e0e0;
            overflow: hidden;
            height: 100vh;
            height: 100dvh;
        }

        #graph { touch-action: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; }
        svg { width: 100%; height: 100%; }
        .node { cursor: pointer; }
        .node circle { stroke-width: 1.5; transition: r 0.2s; }
        .node.selected circle { stroke: #fff; stroke-width: 3; }
        .node text { font-size: 9px; fill: #999; pointer-events: none; text-anchor: middle; }
        .link { stroke-opacity: 0.3; }
        .link.contradicts { stroke: #ff4444; stroke-dasharray: 4,2; }
        .link.supports { stroke: #44aa44; }
        .link.derived_from { stroke: #4488cc; }
        .link.questions { stroke: #22d3ee; stroke-dasharray: 2,3; }
        .link.influences { stroke: #da77f2; }

        #topbar {
            position: fixed; top: 0; left: 0; right: 0; height: 44px;
            background: rgba(17,17,17,0.92); backdrop-filter: blur(12px);
            display: flex; align-items: center; padding: 0 12px; z-index: 100;
            border-bottom: 1px solid #222; gap: 10px;
        }
        #topbar .logo { font-size: 18px; }
        #topbar .title { font-size: 14px; font-weight: 600; color: #f5c542; }
        #topbar .stats { font-size: 11px; color: #666; margin-left: auto; display: flex; gap: 8px; }
        #topbar .stats b { color: #f5c542; }

        /* Filter bar */
        #filters {
            position: fixed; top: 44px; left: 0; right: 0; height: 40px;
            background: rgba(17,17,17,0.88); backdrop-filter: blur(8px);
            display: flex; align-items: center; padding: 0 10px; gap: 6px;
            z-index: 95; border-bottom: 1px solid #1a1a1a; overflow-x: auto;
        }
        .filter-btn {
            padding: 4px 10px; border-radius: 14px; font-size: 11px;
            border: 1px solid #333; background: transparent; color: #999;
            cursor: pointer; white-space: nowrap; transition: all 0.2s;
            display: flex; align-items: center; gap: 4px;
        }
        .filter-btn:hover { border-color: #555; color: #ccc; }
        .filter-btn.active { border-color: var(--fc); color: var(--fc); background: color-mix(in srgb, var(--fc) 15%, transparent); }
        .filter-dot { width: 8px; height: 8px; border-radius: 50%; }
        .layout-btn {
            padding: 4px 10px; border-radius: 14px; font-size: 11px;
            border: 1px solid #444; background: #1a1a1a; color: #aaa;
            cursor: pointer; margin-left: auto; white-space: nowrap;
        }
        .layout-btn.active { border-color: #f5c542; color: #f5c542; background: rgba(245,197,66,0.1); }

        #search-wrap { position: fixed; top: 92px; left: 8px; right: 8px; z-index: 90; }
        #search {
            width: 100%; padding: 10px 14px;
            background: rgba(30,30,30,0.92); backdrop-filter: blur(8px);
            border: 1px solid #333; border-radius: 10px;
            color: #e0e0e0; font-size: 15px; outline: none;
        }
        #search:focus { border-color: #f5c542; }
        #search::placeholder { color: #555; }

        #panel {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: rgba(17,17,17,0.95); backdrop-filter: blur(16px);
            border-top: 1px solid #333; border-radius: 16px 16px 0 0;
            z-index: 100; transform: translateY(calc(100% - 36px));
            transition: transform 0.3s ease; max-height: 80vh;
            overflow-y: auto; -webkit-overflow-scrolling: touch;
        }
        #panel.open { transform: translateY(0); }
        #panel-handle { width: 40px; height: 5px; background: #666; border-radius: 3px; margin: 0 auto; cursor: grab; }
        #panel-handle-zone { padding: 12px 0 8px; text-align: center; }
        #panel-content { padding: 4px 16px 24px; }
        .panel-label { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: #666; margin: 12px 0 6px; }
        .panel-text { font-size: 14px; line-height: 1.5; color: #ddd; }
        .panel-meta { font-size: 11px; color: #888; margin-top: 4px; }
        .chain-step { padding: 8px 0; border-bottom: 1px solid #1a1a1a; }
        .chain-step:last-child { border-bottom: none; }
        .chain-reason { font-size: 11px; color: #f5c542; font-style: italic; margin-top: 2px; }
        .chain-content { font-size: 13px; color: #ccc; }
        .node-type-badge {
            display: inline-block; font-size: 9px; padding: 2px 6px;
            border-radius: 4px; text-transform: uppercase; letter-spacing: 0.5px; margin-left: 6px;
        }

        #legend {
            position: fixed; bottom: 44px; right: 8px;
            background: rgba(17,17,17,0.85); border-radius: 8px;
            padding: 8px 10px; font-size: 10px; z-index: 90;
            display: flex; flex-direction: column; gap: 3px;
        }
        .legend-row { display: flex; align-items: center; gap: 6px; }
        .legend-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

        @media (min-width: 768px) {
            #search-wrap { left: 16px; right: auto; width: 300px; }
            #panel { left: auto; right: 0; top: 0; bottom: 0; width: 380px; border-radius: 0; transform: translateX(100%); max-height: 100vh; }
            #panel.open { transform: translateX(0); }
            #panel-handle { display: none; }
            #legend { bottom: 16px; right: 16px; }
        }
    </style>
</head>
<body>

<div id="topbar">
    <span class="logo">🥜</span>
    <span class="title">cashew · clean room v2</span>
    <div class="stats">
        <span><b id="stat-nodes">0</b> nodes</span>
        <span><b id="stat-edges">0</b> edges</span>
    </div>
</div>

<div id="filters">
    <button class="filter-btn active" data-type="all" style="--fc:#fff"><span class="filter-dot" style="background:#fff"></span>All</button>
    <button class="filter-btn" data-type="seed" style="--fc:#f5c542"><span class="filter-dot" style="background:#f5c542"></span>Seed <span class="filter-count" data-type="seed"></span></button>
    <button class="filter-btn" data-type="belief" style="--fc:#51cf66"><span class="filter-dot" style="background:#51cf66"></span>Belief <span class="filter-count" data-type="belief"></span></button>
    <button class="filter-btn" data-type="environment" style="--fc:#ff6b6b"><span class="filter-dot" style="background:#ff6b6b"></span>Environment <span class="filter-count" data-type="environment"></span></button>
    <button class="filter-btn" data-type="derived" style="--fc:#74c0fc"><span class="filter-dot" style="background:#74c0fc"></span>Derived <span class="filter-count" data-type="derived"></span></button>
    <button class="layout-btn" id="timeline-btn">⏱ Timeline</button>
</div>

<div id="search-wrap">
    <input type="text" id="search" placeholder="Search thoughts...">
</div>

<div id="graph"></div>

<div id="legend">
    <div style="font-size:9px;color:#555;margin-bottom:3px;text-transform:uppercase;letter-spacing:0.5px;">Nodes</div>
    <div class="legend-row"><div class="legend-dot" style="background:#f5c542"></div> Seed (foundational beliefs)</div>
    <div class="legend-row"><div class="legend-dot" style="background:#51cf66"></div> Belief (doctrines)</div>
    <div class="legend-row"><div class="legend-dot" style="background:#ff6b6b"></div> Environment (counter-evidence)</div>
    <div class="legend-row"><div class="legend-dot" style="background:#74c0fc"></div> Derived (AI reasoned)</div>
    <div style="font-size:9px;color:#555;margin:6px 0 3px;text-transform:uppercase;letter-spacing:0.5px;">Edges</div>
    <div class="legend-row"><div style="width:18px;height:2px;background:#4488cc;flex-shrink:0;"></div> derived_from</div>
    <div class="legend-row"><div style="width:18px;height:2px;background:#44aa44;flex-shrink:0;"></div> supports</div>
    <div class="legend-row"><div style="width:18px;height:2px;background:#ff4444;flex-shrink:0;border-top:2px dashed #ff4444;"></div> contradicts</div>
    <div class="legend-row"><div style="width:18px;height:2px;background:#22d3ee;flex-shrink:0;border-top:2px dashed #22d3ee;"></div> questions</div>
    <div class="legend-row"><div style="width:18px;height:2px;background:#da77f2;flex-shrink:0;"></div> influences</div>
</div>

<div id="panel">
    <div id="panel-handle-zone"><div id="panel-handle"></div></div>
    <div id="panel-content">
        <div style="color:#666;font-size:13px;text-align:center;padding:20px 0;">
            Tap a node to inspect it
        </div>
    </div>
</div>

<script>
const COLORS = {
    seed: '#f5c542',
    belief: '#51cf66',
    environment: '#ff6b6b',
    derived: '#74c0fc',
};

function getNodeColor(d) {
    return COLORS[d.type] || '#888';
}

let graphData, simulation, svg, g, link, node, labels, zoom;
let selectedNode = null;
let activeFilter = 'all';
let timelineMode = false;
let allNodes, allEdges, degree;

async function init() {
    const resp = await fetch('./data/experiment-clean-v2.json');
    graphData = await resp.json();

    allNodes = graphData.nodes.map(n => ({...n, type: n.type || n.node_type}));
    allEdges = graphData.edges.map(e => ({
        source: e.source, target: e.target,
        relation: e.relation, weight: e.weight, reasoning: e.reasoning
    }));

    const nodeIds = new Set(allNodes.map(n => n.id));
    allEdges = allEdges.filter(e => nodeIds.has(e.source) && nodeIds.has(e.target));

    document.getElementById('stat-nodes').textContent = allNodes.length;
    document.getElementById('stat-edges').textContent = allEdges.length;

    // Set filter counts
    const counts = {};
    allNodes.forEach(n => counts[n.type] = (counts[n.type] || 0) + 1);
    document.querySelectorAll('.filter-count').forEach(el => {
        el.textContent = `(${counts[el.dataset.type] || 0})`;
    });

    // Degree
    degree = {};
    allNodes.forEach(n => degree[n.id] = 0);
    allEdges.forEach(e => {
        degree[e.source] = (degree[e.source] || 0) + 1;
        degree[e.target] = (degree[e.target] || 0) + 1;
    });

    // Compute derivation depth (BFS from seeds/beliefs/environment)
    const adj = {};
    allNodes.forEach(n => adj[n.id] = []);
    allEdges.forEach(e => {
        // parent→child: source→target in derivation_edges
        if (!adj[e.source]) adj[e.source] = [];
        adj[e.source].push(e.target);
    });
    const depthMap = {};
    const queue = [];
    allNodes.forEach(n => {
        if (n.type === 'seed' || n.type === 'belief' || n.type === 'environment') {
            depthMap[n.id] = n.type === 'seed' ? 0 : (n.type === 'belief' ? 1 : 1);
            queue.push(n.id);
        }
    });
    // BFS
    let qi = 0;
    while (qi < queue.length) {
        const cur = queue[qi++];
        (adj[cur] || []).forEach(child => {
            if (depthMap[child] === undefined || depthMap[child] > depthMap[cur] + 1) {
                depthMap[child] = depthMap[cur] + 1;
                queue.push(child);
            }
        });
    }
    // Assign depth to nodes missing from BFS
    allNodes.forEach(n => {
        n._depth = depthMap[n.id] !== undefined ? depthMap[n.id] : 10;
    });

    const W = window.innerWidth, H = window.innerHeight;

    svg = d3.select('#graph').append('svg').attr('width', W).attr('height', H);
    g = svg.append('g');

    zoom = d3.zoom().scaleExtent([0.1, 5]).on('zoom', e => g.attr('transform', e.transform));
    svg.call(zoom);

    simulation = d3.forceSimulation(allNodes)
        .force('link', d3.forceLink(allEdges).id(d => d.id).distance(60).strength(0.3))
        .force('charge', d3.forceManyBody().strength(-120))
        .force('center', d3.forceCenter(W / 2, H / 2))
        .force('collision', d3.forceCollide().radius(d => getRadius(degree[d.id] || 0) + 4));

    link = g.append('g').selectAll('line')
        .data(allEdges).enter().append('line')
        .attr('class', d => 'link ' + (d.relation || ''))
        .attr('stroke-width', d => Math.max(0.5, (d.weight || 0.5) * 2))
        .attr('stroke', d => {
            const colors = { contradicts: '#ff4444', supports: '#44aa44', derived_from: '#4488cc', questions: '#22d3ee', influences: '#da77f2' };
            return colors[d.relation] || '#555';
        });

    node = g.append('g').selectAll('g')
        .data(allNodes).enter().append('g')
        .attr('class', 'node')
        .call(d3.drag().on('start', dragstart).on('drag', dragging).on('end', dragend));

    node.append('circle')
        .attr('r', d => getRadius(degree[d.id] || 0))
        .attr('fill', d => getNodeColor(d))
        .attr('stroke', d => d3.color(getNodeColor(d)).darker(0.5));

    labels = node.append('text')
        .text(d => truncate(d.content, 20))
        .attr('dy', d => -(getRadius(degree[d.id] || 0) + 4));

    node.on('click', (e, d) => { e.stopPropagation(); selectNode(d); });
    svg.on('click', () => { selectedNode = null; node.classed('selected', false); resetOpacity(); closePanel(); });

    simulation.on('tick', () => {
        link.attr('x1', d => d.source.x).attr('y1', d => d.source.y)
            .attr('x2', d => d.target.x).attr('y2', d => d.target.y);
        node.attr('transform', d => `translate(${d.x},${d.y})`);
    });

    // Search
    document.getElementById('search').addEventListener('input', e => {
        const q = e.target.value.toLowerCase();
        if (!q) { applyFilter(); return; }
        node.style('opacity', d => d.content.toLowerCase().includes(q) ? 1 : 0.08);
        labels.style('opacity', d => d.content.toLowerCase().includes(q) ? 1 : 0.08);
        link.style('opacity', 0.03);
        const matches = allNodes.filter(n => n.content.toLowerCase().includes(q));
        if (matches.length === 1) selectNode(matches[0]);
    });

    // Filter buttons
    document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            activeFilter = btn.dataset.type;
            applyFilter();
        });
    });

    // Timeline toggle
    document.getElementById('timeline-btn').addEventListener('click', () => {
        timelineMode = !timelineMode;
        document.getElementById('timeline-btn').classList.toggle('active', timelineMode);
        if (timelineMode) enterTimeline(); else exitTimeline();
    });

    // Panel swipe
    const panel = document.getElementById('panel');
    const handleZone = document.getElementById('panel-handle-zone');
    let startY = 0, panelDragging = false;
    handleZone.addEventListener('touchstart', e => { panelDragging = true; startY = e.touches[0].clientY; panel.style.transition = 'none'; });
    handleZone.addEventListener('touchmove', e => { if (!panelDragging) return; const dy = e.touches[0].clientY - startY; if (dy > 0) panel.style.transform = `translateY(${dy}px)`; });
    handleZone.addEventListener('touchend', e => { if (!panelDragging) return; panelDragging = false; panel.style.transition = 'transform 0.3s ease'; if (e.changedTouches[0].clientY - startY > 80) { panel.classList.remove('open'); panel.style.transform = ''; } else { panel.style.transform = ''; } });
    handleZone.addEventListener('click', e => { e.stopPropagation(); panel.classList.toggle('open'); });

    // Auto-fit
    function fitGraph() {
        const bounds = g.node().getBBox();
        if (bounds.width === 0) return;
        const pad = 60;
        const scale = Math.min((W - pad) / bounds.width, (H - pad) / bounds.height) * 0.85;
        const tx = W/2 - (bounds.x + bounds.width/2) * scale;
        const ty = H/2 - (bounds.y + bounds.height/2) * scale;
        svg.transition().duration(800).call(zoom.transform, d3.zoomIdentity.translate(tx, ty).scale(Math.min(scale, 1.5)));
    }
    setTimeout(fitGraph, 500);
    setTimeout(fitGraph, 2000);
    setTimeout(() => { simulation.alphaTarget(0); fitGraph(); }, 4000);
}

function applyFilter() {
    if (activeFilter === 'all') {
        node.style('opacity', 1);
        labels.style('opacity', 1);
        link.style('opacity', null);
    } else {
        const matchIds = new Set(allNodes.filter(n => n.type === activeFilter).map(n => n.id));
        // Also show directly connected nodes
        const connected = new Set(matchIds);
        allEdges.forEach(e => {
            const sid = typeof e.source === 'object' ? e.source.id : e.source;
            const tid = typeof e.target === 'object' ? e.target.id : e.target;
            if (matchIds.has(sid)) connected.add(tid);
            if (matchIds.has(tid)) connected.add(sid);
        });
        node.style('opacity', d => matchIds.has(d.id) ? 1 : (connected.has(d.id) ? 0.3 : 0.05));
        labels.style('opacity', d => matchIds.has(d.id) ? 1 : (connected.has(d.id) ? 0.3 : 0.05));
        link.style('opacity', e => {
            const sid = typeof e.source === 'object' ? e.source.id : e.source;
            const tid = typeof e.target === 'object' ? e.target.id : e.target;
            return (matchIds.has(sid) || matchIds.has(tid)) ? 0.6 : 0.02;
        });
    }
}

function enterTimeline() {
    const W = window.innerWidth, H = window.innerHeight;
    const maxDepth = d3.max(allNodes, d => d._depth) || 1;
    const margin = 100;

    // Group by depth, spread vertically within each column
    const byDepth = {};
    allNodes.forEach(n => {
        if (!byDepth[n._depth]) byDepth[n._depth] = [];
        byDepth[n._depth].push(n);
    });

    // Position: x by depth, y spread evenly
    allNodes.forEach(n => {
        const col = byDepth[n._depth];
        const idx = col.indexOf(n);
        const ySpacing = Math.min(50, (H - margin * 2) / col.length);
        n.fx = margin + (n._depth / maxDepth) * (W - margin * 2);
        n.fy = H/2 - (col.length - 1) * ySpacing / 2 + idx * ySpacing;
    });

    simulation.alpha(0.5).restart();

    // Fit after settling
    setTimeout(() => {
        const bounds = g.node().getBBox();
        if (bounds.width === 0) return;
        const pad = 80;
        const scale = Math.min((W - pad) / bounds.width, (H - pad) / bounds.height) * 0.85;
        const tx = W/2 - (bounds.x + bounds.width/2) * scale;
        const ty = H/2 - (bounds.y + bounds.height/2) * scale;
        svg.transition().duration(800).call(zoom.transform, d3.zoomIdentity.translate(tx, ty).scale(Math.min(scale, 1.2)));
    }, 600);
}

function exitTimeline() {
    allNodes.forEach(n => { n.fx = null; n.fy = null; });
    simulation.alpha(0.8).restart();
}

function getRadius(deg) { return Math.max(4, Math.min(16, 4 + deg * 1.5)); }
function truncate(s, n) { return !s ? '' : s.length > n ? s.slice(0, n) + '…' : s; }

function selectNode(d) {
    selectedNode = d;
    node.classed('selected', n => n.id === d.id);
    const connected = new Set([d.id]);
    allEdges.forEach(e => {
        const sid = typeof e.source === 'object' ? e.source.id : e.source;
        const tid = typeof e.target === 'object' ? e.target.id : e.target;
        if (sid === d.id) connected.add(tid);
        if (tid === d.id) connected.add(sid);
    });
    node.style('opacity', n => connected.has(n.id) ? 1 : 0.1);
    labels.style('opacity', n => connected.has(n.id) ? 1 : 0.1);
    link.style('opacity', e => {
        const sid = typeof e.source === 'object' ? e.source.id : e.source;
        const tid = typeof e.target === 'object' ? e.target.id : e.target;
        return (sid === d.id || tid === d.id) ? 0.8 : 0.03;
    });
    showPanel(d);
}

function showPanel(d) {
    const panel = document.getElementById('panel');
    const content = document.getElementById('panel-content');
    const c = COLORS[d.type] || '#888';
    const typeBadge = `<span class="node-type-badge" style="background:${c}33;color:${c}">${d.type}</span>`;

    const parents = allEdges
        .filter(e => (typeof e.target === 'object' ? e.target.id : e.target) === d.id)
        .map(e => { const pid = typeof e.source === 'object' ? e.source.id : e.source; return { node: allNodes.find(n => n.id === pid), edge: e }; })
        .filter(p => p.node);

    const children = allEdges
        .filter(e => (typeof e.source === 'object' ? e.source.id : e.source) === d.id)
        .map(e => { const cid = typeof e.target === 'object' ? e.target.id : e.target; return { node: allNodes.find(n => n.id === cid), edge: e }; })
        .filter(c => c.node);

    let html = `
        <div class="panel-label">Thought ${typeBadge} <span style="color:#555;font-size:9px;margin-left:8px;">depth ${d._depth}</span></div>
        <div class="panel-text" style="font-size:16px;font-weight:500;">${d.content}</div>
        <div class="panel-meta">${d.source_file === 'system_generated' ? '🤖 AI Generated' : '🧠 Seeded'}</div>
    `;

    if (parents.length) {
        html += `<div class="panel-label">Derived From (${parents.length})</div>`;
        parents.forEach(p => {
            const pc = COLORS[p.node.type] || '#888';
            html += `<div class="chain-step"><div class="chain-content"><span style="color:${pc};font-size:10px;">●</span> ${p.node.content}</div><div class="chain-reason">${p.edge.relation}: ${p.edge.reasoning || ''}</div></div>`;
        });
    }
    if (children.length) {
        html += `<div class="panel-label">Leads To (${children.length})</div>`;
        children.forEach(c => {
            const cc = COLORS[c.node.type] || '#888';
            html += `<div class="chain-step"><div class="chain-content"><span style="color:${cc};font-size:10px;">●</span> ${c.node.content}</div><div class="chain-reason">${c.edge.relation}: ${c.edge.reasoning || ''}</div></div>`;
        });
    }
    if (!parents.length && !children.length) {
        html += `<div class="panel-label">Connections</div><div class="panel-meta">Orphan node — no derivation edges</div>`;
    }
    content.innerHTML = html;
    panel.classList.add('open');
}

function closePanel() { document.getElementById('panel').classList.remove('open'); }
function resetOpacity() { node.style('opacity', 1); labels.style('opacity', 1); link.style('opacity', null); }
function dragstart(e, d) { if (!e.active) simulation.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; }
function dragging(e, d) { d.fx = e.x; d.fy = e.y; }
function dragend(e, d) { if (!e.active) simulation.alphaTarget(0); if (!timelineMode) { d.fx = null; d.fy = null; } }

init();
</script>
</body>
</html>
