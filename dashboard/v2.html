<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🥜 cashew</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
  :root {
    --bg: #0a0a0a; --panel: #111; --border: #1f1f1f;
    --fg: #e6e6e6; --dim: #777; --accent: #f5c542;
    --raj: #7cc4ff; --bunny: #f5c542;
    --fact: #8ad18a; --insight: #c48aff; --observation: #ffb347;
    --decision: #ff7ac2; --core_memory: #ff6b6b; --belief: #66d9e8; --derived: #a0a0a0;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; }
  body {
    font: 14px -apple-system, BlinkMacSystemFont, 'SF Pro', system-ui, sans-serif;
    background: var(--bg); color: var(--fg);
  }
  canvas { position: fixed; inset: 0; cursor: grab; }
  canvas:active { cursor: grabbing; }

  #topbar {
    position: fixed; top: 0; left: 0; right: 0; height: 52px;
    display: flex; align-items: center; gap: 12px; padding: 0 16px;
    background: rgba(10,10,10,0.75); backdrop-filter: blur(14px);
    border-bottom: 1px solid var(--border); z-index: 10;
  }
  #logo { font-size: 18px; color: var(--accent); font-weight: 600; letter-spacing: 0.5px; }
  #search {
    flex: 1; max-width: 560px; height: 34px; padding: 0 14px;
    background: var(--panel); border: 1px solid var(--border); border-radius: 17px;
    color: var(--fg); font-size: 13px; outline: none; transition: border-color 0.15s;
  }
  #search:focus { border-color: var(--accent); }
  #stats { margin-left: auto; font-size: 11px; color: var(--dim); }
  #stats b { color: var(--accent); font-weight: 500; }

  #side {
    position: fixed; top: 52px; bottom: 0; right: 0; width: 360px;
    background: rgba(10,10,10,0.92); backdrop-filter: blur(14px);
    border-left: 1px solid var(--border);
    transform: translateX(100%); transition: transform 0.25s ease; z-index: 9;
    overflow-y: auto; padding: 44px 16px 16px;
  }
  #side.open { transform: translateX(0); }
  #side-header {
    position: sticky; top: -44px; margin: -44px -16px 8px; padding: 10px 14px;
    background: rgba(10,10,10,0.92); border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 8px; z-index: 2;
  }
  #side-title { font-size: 11px; color: var(--dim); text-transform: uppercase;
                letter-spacing: 1px; font-weight: 500; flex: 1; }
  #side-close {
    width: 28px; height: 28px; border-radius: 14px; border: 1px solid var(--border);
    background: var(--panel); color: var(--fg); font-size: 16px; cursor: pointer;
    display: flex; align-items: center; justify-content: center; line-height: 1;
  }
  #side-close:hover { border-color: var(--accent); color: var(--accent); }
  #focus-toggle {
    font-size: 10px; color: var(--dim); border: 1px solid var(--border);
    background: var(--panel); padding: 3px 8px; border-radius: 10px; cursor: pointer;
  }
  #focus-toggle.on { border-color: var(--accent); color: var(--accent); }
  #drag-handle { display: none; }
  @media (max-width: 640px) {
    #side { top: auto; left: 0; right: 0; bottom: 0; width: 100%;
            height: 55vh; max-height: 90vh; min-height: 80px;
            border-left: none; border-top: 1px solid var(--border);
            border-radius: 14px 14px 0 0; transform: translateY(100%);
            padding-top: 52px; }
    #side.open { transform: translateY(0); }
    #drag-handle {
      display: block; position: absolute; top: 0; left: 0; right: 0; height: 20px;
      cursor: ns-resize; touch-action: none; z-index: 3;
    }
    #drag-handle::before {
      content: ''; position: absolute; top: 7px; left: 50%;
      transform: translateX(-50%); width: 40px; height: 4px;
      background: #444; border-radius: 2px;
    }
    #side-header { top: 20px; margin-top: -32px; }
    #stats { font-size: 10px; }
    #search { font-size: 16px; }
    #hint { display: none; }
    #legend { font-size: 9.5px; gap: 6px; padding: 4px 7px; }
  }
  .node-card {
    padding: 10px 12px; margin-bottom: 8px; background: var(--panel);
    border: 1px solid var(--border); border-left: 3px solid var(--dim);
    border-radius: 6px; font-size: 12.5px; line-height: 1.45; cursor: pointer;
    transition: border-color 0.15s;
  }
  .node-card:hover { border-color: #333; }
  .node-card .meta { font-size: 10.5px; color: var(--dim); margin-top: 6px;
                     display: flex; gap: 8px; }
  .node-card .meta .type { color: var(--accent); text-transform: uppercase;
                           letter-spacing: 0.5px; font-weight: 500; }
  .node-card .meta .score { color: var(--fact); font-family: ui-monospace, monospace; }
  .node-card .hop { display: inline-block; padding: 1px 6px; border-radius: 8px;
                    background: #222; font-size: 10px; color: #aaa; margin-right: 6px; }

  #progress {
    position: fixed; top: 52px; left: 0; right: 0; height: 2px;
    background: transparent; z-index: 8;
  }
  #progress .bar {
    height: 100%; background: linear-gradient(90deg, var(--accent), transparent);
    width: 0%; transition: width 0.4s ease;
  }

  #hop-legend {
    position: fixed; top: 58px; left: 50%; transform: translateX(-50%);
    display: none; gap: 8px; background: rgba(17,17,17,0.85);
    backdrop-filter: blur(8px); padding: 5px 10px; border-radius: 14px;
    border: 1px solid var(--border); font-size: 10.5px; color: var(--dim);
    z-index: 6; white-space: nowrap;
  }
  #hop-legend.on { display: flex; }
  #hop-legend .h { display: inline-flex; align-items: center; gap: 4px; }
  #hop-legend .bar { width: 14px; height: 2px; border-radius: 1px; }

  #hint {
    position: fixed; left: 16px; bottom: 14px; font-size: 11px; color: var(--dim);
    background: rgba(17,17,17,0.7); padding: 6px 10px; border-radius: 6px;
    backdrop-filter: blur(6px); z-index: 5;
  }
  #hint kbd { background: #222; padding: 1px 5px; border-radius: 3px;
              font: 10px ui-monospace, monospace; color: #ccc; border: 1px solid #333; }

  #legend {
    position: fixed; right: 16px; bottom: 14px; display: flex; gap: 10px;
    font-size: 10.5px; color: var(--dim); z-index: 5;
    background: rgba(17,17,17,0.7); padding: 6px 10px; border-radius: 6px;
    backdrop-filter: blur(6px);
  }
  .sw { display: inline-block; width: 8px; height: 8px; border-radius: 50%;
        margin-right: 4px; vertical-align: middle; }
</style>
</head>
<body>
<div id="topbar">
  <div id="logo">🥜 cashew</div>
  <input id="search" placeholder="Search your brain — Enter to trace BFS…" autocomplete="off" />
  <div id="stats"><b id="s-nodes">0</b> nodes · <b id="s-edges">0</b> edges</div>
</div>
<div id="progress"><div class="bar" id="progress-bar"></div></div>
<div id="hop-legend">
  <span class="h"><span class="bar" style="background:#fff"></span>seeds</span>
  <span class="h"><span class="bar" style="background:#7cc4ff"></span>hop 1</span>
  <span class="h"><span class="bar" style="background:#f5c542"></span>hop 2</span>
  <span class="h"><span class="bar" style="background:#ff7ac2"></span>hop 3</span>
</div>
<canvas id="c"></canvas>
<aside id="side">
  <div id="drag-handle"></div>
  <div id="side-header">
    <div id="side-title">Search results</div>
    <button id="focus-toggle" title="Hide non-matching nodes">focus</button>
    <button id="side-close" aria-label="Close">×</button>
  </div>
  <div id="side-body"></div>
</aside>
<div id="hint"><kbd>/</kbd> search · <kbd>Esc</kbd> clear · drag to pan · scroll to zoom</div>
<div id="legend">
  <span><span class="sw" style="background:var(--fact)"></span>fact</span>
  <span><span class="sw" style="background:var(--insight)"></span>insight</span>
  <span><span class="sw" style="background:var(--observation)"></span>obs</span>
  <span><span class="sw" style="background:var(--decision)"></span>decision</span>
  <span><span class="sw" style="background:var(--belief)"></span>belief</span>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const search = document.getElementById('search');
const side = document.getElementById('side');
const sideBody = document.getElementById('side-body');
const sideTitle = document.getElementById('side-title');
const progressBar = document.getElementById('progress-bar');
const sideClose = document.getElementById('side-close');
const focusToggle = document.getElementById('focus-toggle');
let focusMode = false;
sideClose.addEventListener('click', () => side.classList.remove('open'));

const dragHandle = document.getElementById('drag-handle');
let dragStartY = 0, dragStartH = 0;
function onDragMove(e) {
  const y = e.touches ? e.touches[0].clientY : e.clientY;
  const newH = Math.min(window.innerHeight * 0.9,
                        Math.max(80, dragStartH + (dragStartY - y)));
  side.style.height = newH + 'px';
}
function onDragEnd() {
  window.removeEventListener('pointermove', onDragMove);
  window.removeEventListener('pointerup', onDragEnd);
  window.removeEventListener('touchmove', onDragMove);
  window.removeEventListener('touchend', onDragEnd);
}
dragHandle.addEventListener('pointerdown', (e) => {
  dragStartY = e.clientY;
  dragStartH = side.getBoundingClientRect().height;
  window.addEventListener('pointermove', onDragMove);
  window.addEventListener('pointerup', onDragEnd);
  e.preventDefault();
});
dragHandle.addEventListener('touchstart', (e) => {
  dragStartY = e.touches[0].clientY;
  dragStartH = side.getBoundingClientRect().height;
  window.addEventListener('touchmove', onDragMove, { passive: false });
  window.addEventListener('touchend', onDragEnd);
}, { passive: true });
focusToggle.addEventListener('click', () => {
  focusMode = !focusMode;
  focusToggle.classList.toggle('on', focusMode);
  render();
});

const TYPE_COLOR = {
  fact: '#8ad18a', insight: '#c48aff', observation: '#ffb347',
  decision: '#ff7ac2', core_memory: '#ff6b6b', belief: '#66d9e8',
  derived: '#a0a0a0',
};
const typeColor = t => TYPE_COLOR[t] || '#888';
const HOP_EDGE_COLOR = [
  'rgba(245,197,66,0.0)',  // unused (hop 0 = seeds, no edges)
  'rgba(124,196,255,0.85)', // hop 1 — blue
  'rgba(245,197,66,0.85)',  // hop 2 — amber
  'rgba(255,122,194,0.85)', // hop 3 — pink
  'rgba(138,209,138,0.85)', // hop 4 — green
];

let W = 0, H = 0, dpr = window.devicePixelRatio || 1;
function resize() {
  W = window.innerWidth; H = window.innerHeight;
  canvas.width = W * dpr; canvas.height = H * dpr;
  canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
window.addEventListener('resize', resize); resize();

let nodes = [], edges = [], nodeIndex = new Map();
let transform = d3.zoomIdentity;
const highlight = new Map(); // id -> { hop, score, born }
let activeEdges = new Map();  // key "src|tgt" -> hop level
let activeES = null;

const simulation = d3.forceSimulation()
  .force('link', d3.forceLink().id(d => d.id).distance(60).strength(0.15))
  .force('charge', d3.forceManyBody().strength(-120).distanceMax(400))
  .force('center', d3.forceCenter(W/2, H/2))
  .force('collide', d3.forceCollide().radius(d => nodeRadius(d) + 2))
  .alphaDecay(0.03)
  .on('tick', render);

function nodeRadius(n) {
  const deg = n._deg || 1;
  return 2.5 + Math.min(8, Math.sqrt(deg));
}

function render() {
  ctx.clearRect(0, 0, W, H);
  ctx.save();
  ctx.translate(transform.x, transform.y);
  ctx.scale(transform.k, transform.k);

  const hasHighlight = highlight.size > 0;
  const now = performance.now();

  // edges
  ctx.lineWidth = 0.6 / transform.k;
  for (const e of edges) {
    const s = e.source, t = e.target;
    if (!s.x || !t.x) continue;
    const key = s.id + '|' + t.id;
    const isActive = activeEdges.has(key);
    if (hasHighlight && focusMode && !isActive) {
      continue;
    } else if (hasHighlight && !isActive) {
      ctx.strokeStyle = 'rgba(60,60,60,0.15)';
    } else if (isActive) {
      const hop = activeEdges.get(key) || 1;
      ctx.strokeStyle = HOP_EDGE_COLOR[Math.min(hop, HOP_EDGE_COLOR.length - 1)];
      ctx.lineWidth = 1.4 / transform.k;
    } else {
      ctx.strokeStyle = 'rgba(100,100,100,0.25)';
    }
    ctx.beginPath();
    ctx.moveTo(s.x, s.y); ctx.lineTo(t.x, t.y);
    ctx.stroke();
    ctx.lineWidth = 0.6 / transform.k;
  }

  // nodes
  for (const n of nodes) {
    if (n.x == null) continue;
    const h = highlight.get(n.id);
    if (hasHighlight && focusMode && !h) continue;
    const r = nodeRadius(n) * (h ? 1.5 : 1);
    let alpha = 1;
    if (hasHighlight && !h) alpha = 0.18;
    ctx.globalAlpha = alpha;
    ctx.fillStyle = typeColor(n.node_type);
    ctx.beginPath();
    ctx.arc(n.x, n.y, r, 0, Math.PI * 2);
    ctx.fill();

    if (h) {
      const age = now - h.born;
      const pulse = Math.max(0, 1 - age / 900);
      if (pulse > 0) {
        ctx.globalAlpha = pulse * 0.7;
        ctx.strokeStyle = typeColor(n.node_type);
        ctx.lineWidth = 2 / transform.k;
        ctx.beginPath();
        ctx.arc(n.x, n.y, r + 6 + pulse * 8, 0, Math.PI * 2);
        ctx.stroke();
      }
      ctx.globalAlpha = 1;
      const ringColor = h.hop === 0
        ? '#ffffff'
        : (HOP_EDGE_COLOR[Math.min(h.hop, HOP_EDGE_COLOR.length - 1)] || '#fff');
      ctx.strokeStyle = ringColor;
      ctx.lineWidth = 2 / transform.k;
      ctx.beginPath();
      ctx.arc(n.x, n.y, r + 1.5, 0, Math.PI * 2);
      ctx.stroke();
    }
  }
  ctx.globalAlpha = 1;
  ctx.restore();

  // keep animating while pulses are alive
  let needsFrame = false;
  for (const h of highlight.values()) {
    if (now - h.born < 900) { needsFrame = true; break; }
  }
  if (needsFrame) requestAnimationFrame(render);
}

// zoom/pan
d3.select(canvas).call(
  d3.zoom().scaleExtent([0.1, 6]).on('zoom', (e) => {
    transform = e.transform; render();
  })
);

// click → detail
canvas.addEventListener('click', (ev) => {
  const [mx, my] = [ev.clientX, ev.clientY];
  const x = (mx - transform.x) / transform.k;
  const y = (my - transform.y) / transform.k;
  let hit = null, best = Infinity;
  for (const n of nodes) {
    if (n.x == null) continue;
    const d = (n.x - x) ** 2 + (n.y - y) ** 2;
    const r = nodeRadius(n) + 4;
    if (d < r * r && d < best) { best = d; hit = n; }
  }
  if (hit) showNode(hit);
});

function showNode(n) {
  sideTitle.textContent = 'Node';
  sideBody.innerHTML = '';
  sideBody.appendChild(cardFor(n, { asDetail: true }));
  side.classList.add('open');
}

function cardFor(n, { hop, score, asDetail } = {}) {
  const div = document.createElement('div');
  div.className = 'node-card';
  div.style.borderLeftColor = typeColor(n.node_type);
  const content = document.createElement('div');
  content.textContent = n.content || '(empty)';
  div.appendChild(content);
  const meta = document.createElement('div');
  meta.className = 'meta';
  const bits = [];
  if (hop != null) bits.push(`<span class="hop">hop ${hop}</span>`);
  bits.push(`<span class="type">${n.node_type || '?'}</span>`);
  if (score != null) bits.push(`<span class="score">${score.toFixed(3)}</span>`);
  if (n.domain) bits.push(`<span>${n.domain}</span>`);
  meta.innerHTML = bits.join('');
  div.appendChild(meta);
  div.addEventListener('click', () => focusNode(n));
  return div;
}

function focusNode(n) {
  if (n.x == null) return;
  const k = Math.max(transform.k, 1.5);
  const tx = W/2 - n.x * k;
  const ty = H/2 - n.y * k;
  d3.select(canvas).transition().duration(500).call(
    d3.zoom().transform, d3.zoomIdentity.translate(tx, ty).scale(k)
  );
}

// load graph
async function loadGraph() {
  const r = await fetch('/api/graph');
  const g = await r.json();
  nodes = g.nodes.map(n => ({ ...n, _deg: 0 }));
  nodeIndex = new Map(nodes.map(n => [n.id, n]));
  edges = [];
  for (const e of g.edges) {
    const s = nodeIndex.get(e.source), t = nodeIndex.get(e.target);
    if (!s || !t) continue;
    edges.push({ source: s, target: t, weight: e.weight });
    s._deg++; t._deg++;
  }
  document.getElementById('s-nodes').textContent = nodes.length;
  document.getElementById('s-edges').textContent = edges.length;
  simulation.nodes(nodes);
  simulation.force('link').links(edges);
  simulation.alpha(1).restart();
}
loadGraph().then(() => {
  const params = new URLSearchParams(location.search);
  const q = params.get('q');
  if (q) {
    search.value = q;
    setTimeout(() => runSearch(q), 1200);
  }
});

// search → SSE BFS
search.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') {
    const q = search.value.trim();
    if (q) runSearch(q);
  } else if (e.key === 'Escape') {
    clearHighlight();
    search.value = '';
  }
});
document.addEventListener('keydown', (e) => {
  if (e.key === '/' && document.activeElement !== search) {
    e.preventDefault(); search.focus();
  } else if (e.key === 'Escape') {
    side.classList.remove('open');
  }
});

function clearHighlight() {
  highlight.clear(); activeEdges.clear();
  side.classList.remove('open');
  progressBar.style.width = '0%';
  document.getElementById('hop-legend').classList.remove('on');
  render();
}

function addHighlight(id, hop, score) {
  const n = nodeIndex.get(id);
  if (!n) return null;
  highlight.set(id, { hop, score, born: performance.now() });
  return n;
}

function markEdgesInto(id, hop) {
  for (const e of edges) {
    if (e.source.id === id || e.target.id === id) {
      const other = e.source.id === id ? e.target.id : e.source.id;
      if (highlight.has(other)) {
        activeEdges.set(e.source.id + '|' + e.target.id, hop);
      }
    }
  }
}

function runSearch(q) {
  if (activeES) { activeES.close(); activeES = null; }
  clearHighlight();
  sideTitle.textContent = `Tracing: "${q}"`;
  sideBody.innerHTML = '<div style="color:#777;font-size:12px;">seeding…</div>';
  side.classList.add('open');
  document.getElementById('hop-legend').classList.add('on');
  progressBar.style.width = '5%';

  const url = '/api/search?q=' + encodeURIComponent(q) + '&seeds=5&picks=3&depth=3';
  const es = new EventSource(url); activeES = es;
  const results = [];
  let step = 0, maxSteps = 1 + 3;

  es.onmessage = (ev) => {
    let msg; try { msg = JSON.parse(ev.data); } catch { return; }
    if (msg.event === 'seeds') {
      sideBody.innerHTML = '';
      for (const s of msg.nodes) {
        const n = addHighlight(s.id, 0, s.score);
        if (n) {
          results.push({ n, hop: 0, score: s.score });
          sideBody.appendChild(cardFor(n, { hop: 0, score: s.score }));
        }
      }
      step = 1;
      progressBar.style.width = (step / maxSteps * 100) + '%';
      render();
    } else if (msg.event === 'hop') {
      for (const h of msg.nodes) {
        const n = addHighlight(h.id, msg.level, h.score);
        if (n) {
          markEdgesInto(h.id, msg.level);
          results.push({ n, hop: msg.level, score: h.score });
          sideBody.appendChild(cardFor(n, { hop: msg.level, score: h.score }));
        }
      }
      step = 1 + msg.level;
      progressBar.style.width = (step / maxSteps * 100) + '%';
      render();
    } else if (msg.event === 'done') {
      progressBar.style.width = '100%';
      setTimeout(() => progressBar.style.width = '0%', 700);
      es.close(); activeES = null;
    } else if (msg.event === 'error') {
      sideBody.innerHTML = `<div style="color:#ff6b6b;font-size:12px;">error: ${msg.message}</div>`;
      es.close(); activeES = null;
    }
  };
  es.onerror = () => {
    es.close(); activeES = null;
    progressBar.style.width = '0%';
  };
}
</script>
</body>
</html>
