database:
  path: data/graph.db
  backup_dir: data/backups
  auto_backup: true
models:
  embedding:
    name: all-MiniLM-L6-v2
    provider: sentence-transformers
    cache_dir: /Users/bunny/.cashew/data/models
domains:
  default: general
  user: user
  ai: ai
  classifications:
  - personal
  - work
  auto_classify: true
  separation_enabled: true
node_types:
  core:
    belief: a held opinion or conviction
    insight: a non-obvious connection or pattern discovered
    decision: a commitment or choice made
    observation: a factual pattern noticed
    fact: a concrete verifiable fact
  custom: {}
performance:
  token_budget: 2000
  top_k_results: 10
  walk_depth: 2
  similarity_threshold: 0.3
  access_weight: 0.2
  temporal_weight: 0.1
  think_cycle_nodes: 5
  clustering_eps: 0.35
  novelty_threshold: 0.82
  confidence_threshold: 0.7
  max_think_iterations: 3
integration:
  openclaw:
    auth_profile_path: ${HOME}/.openclaw/agents/${OPENCLAW_AGENT:-main}/agent/auth-profiles.json
    workspace_path: ${HOME}/.openclaw/workspace
    session_dir: ${HOME}/.openclaw/sessions
logging:
  level: INFO
  format: '%(asctime)s - %(name)s - %(levelname)s - %(message)s'
  file: /Users/bunny/.cashew/data/logs/cashew.log
gc:
  mode: soft
  threshold: 0.05
  grace_days: 7
  protect_types:
  - seed
  - core_memory
  think_cycle_penalty: 1.5
features:
  auto_extraction: true
  think_cycles: true
  sleep_cycles: true
  decay_pruning: true
  pattern_detection: true
think:
  enabled: true
  schedule: 0 5,17 * * *
  frequency: 12h
sleep:
  enabled: true
  schedule: 0 */6 * * *
  frequency: 6h
extract:
  enabled: true
  schedule: 0 */2 * * *
  frequency: 2h
backup:
  schedule: 0 */6 * * *
  frequency: 6h
